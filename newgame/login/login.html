<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grey Dimension</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

</head>

<body>

<section class="auth">

<!-- BANNER -->

<div class="banner">

<img src="images/banner.png" class="banner-img">

<h2 id="formTitle">Login</h2>

</div>


<!-- FORM -->

<div class="form-container">

<!-- LOGIN -->

<form id="loginForm" class="form-box" action="/login" method="POST">

<input name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Enter</button>

<p class="switch">
Don't have an account?
<a onclick="showRegister()">Register now</a>
</p>

</form>


<!-- REGISTER -->

<form id="registerForm" class="form-box">

<input name="username" placeholder="Username" required>

<input name="email" type="email" placeholder="Email" required>

<input name="phone" placeholder="Phone">

<input name="password" type="password" placeholder="Password" required>

<input name="confirm_password" type="password" placeholder="Confirm Password" required>

<button type="submit">Register</button>

<p class="switch">
Already have an account?
<a onclick="showLogin()">Login</a>
</p>

</form>

</div>

</section>


<script>

function showRegister(){

document.getElementById("loginForm").style.display="none"
document.getElementById("registerForm").style.display="flex"
document.getElementById("formTitle").innerText="Register"

}

function showLogin(){

document.getElementById("loginForm").style.display="flex"
document.getElementById("registerForm").style.display="none"
document.getElementById("formTitle").innerText="Login"

}

</script>

</body>
</html>
