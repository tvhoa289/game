<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grey Dimension</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: 'SVN-ImFellDoublePica-Italic';
  src: url('/fonts/SVN-ImFellDoublePica-Italic.otf') format('opentype');
  font-weight: normal;
  font-style: italic;
}
</style>

</head>

<body class="register-mode">

<section class="auth">

<!-- BANNER / BACKGROUND -->

<div class="banner">

<img id="bgImage" class="bg-image" src="images/register.png" alt="Banner">

<h2 id="formTitle">Register</h2>

</div>


<!-- FORM AREA -->

<div class="form-container">

<!-- LOGIN -->

<form id="loginForm" class="form-box" action="/login" method="POST">

<input name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<p class="error" id="loginError"></p>

<button type="submit">ENTER</button>

<p class="switch">
Don't have an account?
<a onclick="showRegister()">Register</a>
</p>

</form>


<!-- REGISTER -->

<form id="registerForm" class="form-box" action="/register" method="POST">

<input name="username" placeholder="Username" required>

<input name="email" type="email" placeholder="Email" required>

<input name="phone" placeholder="Phone">

<input name="password" type="password" placeholder="Password" required>

<input name="confirm_password" type="password" placeholder="Confirm Password" required>

<p class="error" id="regError"></p>

<button type="submit">REGISTER</button>

<p class="switch">
Already have an account?
<a onclick="showLogin()">Login</a>
</p>

</form>

</div>

</section>



<script>

/* ========================= */
/* API URL */
/* ========================= */

const API_URL = 'https://qr-checkout-api.onrender.com/api'

/* ========================= */
/* CHECK LOGIN */
/* ========================= */

const token = localStorage.getItem('token');

if (token) {
  window.location.href = '/?loggedin=true';
}


/* ========================= */
/* LOGIN */
/* ========================= */

document.getElementById('loginForm').addEventListener('submit', async (e) => {

e.preventDefault();

const username = e.target.username.value;
const password = e.target.password.value;

const errorEl = document.getElementById('loginError');

errorEl.textContent = '';

try {

const res = await fetch(API_URL + '/auth/login', {

method:'POST',

headers:{ 'Content-Type':'application/json' },

body:JSON.stringify({ email: username, password })

});

const data = await res.json();

if(data.token){

localStorage.setItem('token', data.token);
localStorage.setItem('user', JSON.stringify(data.user));

window.location.href='/?loggedin=true';

}else{

errorEl.textContent=data.error || 'Invalid credentials';

}

}catch(err){

errorEl.textContent='Cannot connect to server';

}

});


/* ========================= */
/* REGISTER */
/* ========================= */

document.getElementById('registerForm').addEventListener('submit', async (e)=>{

e.preventDefault();

const username=e.target.username.value;
const email=e.target.email.value;
const phone=e.target.phone.value;

const password=e.target.password.value;
const confirmPassword=e.target.confirm_password.value;

const errorEl=document.getElementById('regError');

errorEl.textContent='';

if(password!==confirmPassword){

errorEl.textContent='Passwords do not match';
return;

}

try{

const res=await fetch(API_URL+'/auth/register',{

method:'POST',

headers:{'Content-Type':'application/json'},

body:JSON.stringify({username,email,phone,password})

});

const data=await res.json();

if(data.token){

localStorage.setItem('token',data.token);
localStorage.setItem('user',JSON.stringify(data.user));

window.location.href='/?loggedin=true';

}else{

errorEl.textContent=data.error || 'Registration failed';

}

}catch(err){

errorEl.textContent='Cannot connect to server';

}

});


/* ========================= */
/* SWITCH FORM */
/* ========================= */

function showRegister(){

document.body.classList.remove("login-mode");
document.body.classList.add("register-mode");

document.getElementById("loginForm").style.display="none";
document.getElementById("registerForm").style.display="flex";

document.getElementById("formTitle").innerText="Register";

document.getElementById("bgImage").src="images/register.png";

}


function showLogin(){

document.body.classList.remove("register-mode");
document.body.classList.add("login-mode");

document.getElementById("loginForm").style.display="flex";
document.getElementById("registerForm").style.display="none";

document.getElementById("formTitle").innerText="Login";

document.getElementById("bgImage").src="images/login.png";

}

</script>

</body>
</html>
